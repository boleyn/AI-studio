services:
  agent-sandbox:
    container_name: agent-sandbox
    build:
      context: ./projects/agent-sandbox
      dockerfile: Dockerfile
    environment:
      FASTGPT_ENABLE_CODE_SERVER: "false"
      FASTGPT_WORKDIR: /workspace
      FASTGPT_EXEC_PORT: "8091"
      FASTGPT_EXEC_TOKEN: sandbox-exec-token
    volumes:
      - ./data/sandboxes:/workspace
    ports:
      - 18080:8080
      - 18091:8091
    restart: unless-stopped

  nextjs-ai-studio:
    container_name: nextjs-ai-studio
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NPM_REGISTRY: https://registry.npmmirror.com
        NODE_IMAGE: docker.m.daocloud.io/library/node:20.14.0-alpine
        PIP_INDEX_URL: https://pypi.mirrors.ustc.edu.cn/simple
        PIP_TRUSTED_HOST: pypi.mirrors.ustc.edu.cn
    ports:
      - 18367:3000
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 3000
      RIPGREP_PATH: /usr/bin/rg
      NPM_REGISTRY: https://registry.npmmirror.com
      NPM_CONFIG_REGISTRY: https://registry.npmmirror.com
      PIP_INDEX_URL: https://pypi.mirrors.ustc.edu.cn/simple
      PIP_TRUSTED_HOST: pypi.mirrors.ustc.edu.cn
      CHAT_MODEL_CONFIG_FILE: config/config.json

      MONGODB_URI: mongodb://myusername:mypassword@10.21.8.6:37017/nextjs_ai_studio?authSource=admin&directConnection=true
      JWT_SECRET: dev-auth-secret-change-me
      AUTH_COOKIE_SECURE: "false"

      AIPROXY_API_ENDPOINT: http://10.21.8.6:33006
      AIPROXY_API_TOKEN: aichat-token

      AGENT_SKILL_FILE: skills/aistudio-mcp-code-workflow/SKILL.md
      FEISHU_APP_ID: cli_a9283dab3d4cdcb2
      FEISHU_REDIRECT_URI: https://aistudio.asiainfo.tech/auth/feishu/callback
      
      FEISHU_APP_SECRET: HxxPdVdgN7ILDwY78VlYmfscDmehzqLs
      FEISHU_DEFAULT_PASSWORD: Feishu@123456

      STORAGE_VENDOR: minio
      STORAGE_REGION: us-east-1
      STORAGE_ACCESS_KEY_ID: minio_admin_9xK2pQw
      STORAGE_SECRET_ACCESS_KEY: M!n10S3cur32024!XyZ9@Kp7
      STORAGE_PUBLIC_BUCKET: aichat-public
      STORAGE_PRIVATE_BUCKET: aichat-private
      STORAGE_EXTERNAL_ENDPOINT: https://aisrv-minio.asiainfo.tech
      STORAGE_S3_ENDPOINT: https://aisrv-minio.asiainfo.tech
      STORAGE_S3_FORCE_PATH_STYLE: "true"
      STORAGE_S3_MAX_RETRIES: "3"
      AGENT_SANDBOX_S3_ENABLED: "true"
      AGENT_SANDBOX_S3_PREFIX: agent_sandbox_workspaces
      AGENT_SANDBOX_URL: http://agent-sandbox:8080
      AGENT_SANDBOX_EXEC_URL: http://agent-sandbox:8091/exec
      AGENT_SANDBOX_EXEC_TOKEN: sandbox-exec-token

      SKILL_HUB: https://claw.asiainfo.tech
      # ClawHub one-click edit key validation
      AI_STUDIO_KEY: d0a88f10bc8e4069020c78c74a1176a7f9f3bb5c90f3f02880cf564234f6e299
      SKILL_HUB_PROXY_SECRET: ch_81547e7a828f846d80511c4d5ac4a4eefd3f99b1597b293d

      # Claude Code Feature Flags — 对齐 claude-code DEFAULT_BUILD_FEATURES
      # bun:bundle shim 通过此变量读取 feature() 开关（逗号分隔，区分大小写）
      CLAUDE_FEATURES: "BUDDY,TRANSCRIPT_CLASSIFIER,BRIDGE_MODE,AGENT_TRIGGERS_REMOTE,CHICAGO_MCP,VOICE_MODE,SHOT_STATS,PROMPT_CACHE_BREAK_DETECTION,TOKEN_BUDGET,AGENT_TRIGGERS,ULTRATHINK,BUILTIN_EXPLORE_PLAN_AGENTS,LODESTONE,EXTRACT_MEMORIES,VERIFICATION_AGENT,KAIROS_BRIEF,AWAY_SUMMARY,ULTRAPLAN,DAEMON,ACP,WORKFLOW_SCRIPTS,HISTORY_SNIP,CONTEXT_COLLAPSE,MONITOR_TOOL,FORK_SUBAGENT,KAIROS,COORDINATOR_MODE,LAN_PIPES,BG_SESSIONS,TEMPLATES,POOR"
      
      # 自动压缩阈值覆盖（默认为根据模型动态计算，设置为 80 可以在使用 80% 上下文时主动触发压缩）
      CLAUDE_AUTOCOMPACT_PCT_OVERRIDE: "80"

    volumes:
      - ./config:/app/config:ro
      - ./data/project-templates:/app/data/project-templates:ro
      - ./data/projects:/app/data/projects
      - ./data/sandboxes:/app/.aistudio/sandboxes

    depends_on:
      - agent-sandbox

    restart: unless-stopped
